name: Cleanup untagged GHCR images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Delete untagged palpal-frontend versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: palpal-frontend
          package-type: container
          owner: hunterkennedy
          delete-only-untagged-versions: true

      - name: Delete untagged palpal-conductor versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: palpal-conductor
          package-type: container
          owner: hunterkennedy
          delete-only-untagged-versions: true
