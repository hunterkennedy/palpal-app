services:

  postgres:
    image: postgres:16-alpine
    container_name: palpal-postgres
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - palpal-network

  palpal-frontend:
    build:
      context: ./palpal-frontend
      dockerfile: Dockerfile
      args:
        - NEXT_TELEMETRY_DISABLED=${NEXT_TELEMETRY_DISABLED}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    container_name: palpal-frontend
    environment:
      - PORT=${APP_PORT}
      - NODE_ENV=${NODE_ENV}
      - CONDUCTOR_URL=${CONDUCTOR_URL}
      - CONDUCTOR_ADMIN_KEY=${CONDUCTOR_ADMIN_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    ports:
      - "127.0.0.1:${APP_PORT}:${APP_PORT}"
    depends_on:
      - palpal-conductor
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${APP_PORT:-3001}/ > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - palpal-network

  palpal-conductor:
    build:
      context: ./palpal-conductor
      dockerfile: Dockerfile
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    container_name: palpal-conductor
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - BLURB_URL=${BLURB_URL}
      - BLURB_API_KEY=${BLURB_API_KEY}
      - PORT=${CONDUCTOR_PORT}
      - CONDUCTOR_ADMIN_KEY=${CONDUCTOR_ADMIN_KEY}
      - B2_ENDPOINT_URL=${B2_ENDPOINT_URL}
      - B2_KEY_ID=${B2_KEY_ID}
      - B2_APP_KEY=${B2_APP_KEY}
      - B2_BUCKET=${B2_BUCKET}
    ports:
      - "127.0.0.1:${CONDUCTOR_PORT}:${CONDUCTOR_PORT}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,os; urllib.request.urlopen('http://localhost:' + os.environ.get('PORT','8000') + '/health', timeout=5)\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - palpal-network

volumes:
  postgres_data:

networks:
  palpal-network:
    driver: bridge
