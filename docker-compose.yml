services:

  postgres:
    image: postgres:16-alpine
    container_name: palpal-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - palpal-network

  temporal:
    image: temporalio/auto-setup:1.24
    container_name: palpal-temporal
    environment:
      - DB=${TEMPORAL_DB_PLUGIN}
      - DB_PORT=${TEMPORAL_DB_PORT}
      - POSTGRES_USER=${TEMPORAL_DB_USER}
      - POSTGRES_PWD=${TEMPORAL_DB_PASSWORD}
      - POSTGRES_SEEDS=${TEMPORAL_DB_HOST}
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/config/dynamicconfig/development-sql.yaml
    volumes:
      - ./docker/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    ports:
      - "127.0.0.1:7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - palpal-network

  temporal-ui:
    image: temporalio/ui:2.26
    container_name: palpal-temporal-ui
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS}
    ports:
      - "127.0.0.1:${TEMPORAL_UI_PORT}:8080"
    depends_on:
      - temporal
    restart: unless-stopped
    networks:
      - palpal-network

