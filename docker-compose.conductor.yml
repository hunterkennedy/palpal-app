services:

  postgres:
    image: postgres:16-alpine
    container_name: palpal-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - palpal-network

  palpal-conductor:
    image: ghcr.io/${GHCR_USER}/palpal-conductor:${IMAGE_TAG:-latest}
    container_name: palpal-conductor
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - BLURB_URL=${BLURB_URL}
      - BLURB_API_KEY=${BLURB_API_KEY}
      - AUDIO_PATH=/audio
      - PORT=${CONDUCTOR_PORT}
      - CONDUCTOR_ADMIN_KEY=${CONDUCTOR_ADMIN_KEY}
    ports:
      - "127.0.0.1:${CONDUCTOR_PORT}:${CONDUCTOR_PORT}"
    volumes:
      - ${AUDIO_HOST_PATH}:/audio:z
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - palpal-network

volumes:
  postgres_data:

networks:
  palpal-network:
    driver: bridge
